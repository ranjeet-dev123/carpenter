<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>शिल्पकार वुडवर्क्स | Premium Carpentry Services</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
</head>
<body>
  
        <div class="footer-bottom">
            <p>&copy; 2025 शिल्पकार वुडवर्क्स. <span data-en="All rights reserved." data-hi="सर्वाधिकार सुरक्षित।">सर्वाधिकार सुरक्षित।</span></p>
        </div>
    </footer>

    <!-- Floating Buttons -->
    <div class="floating-buttons">
        <a href="https://wa.me/+916306683490" class="floating-btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
        <a href="tel:+916306683490" class="floating-btn call">
            <i class="fas fa-phone-alt"></i>
        </a>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <span class="lightbox-prev" onclick="changeImage(-1)">&#10094;</span>
        <span class="lightbox-next" onclick="changeImage(1)">&#10095;</span>
        <img src="" alt="Gallery Image" id="lightboxImage">
    </div>

    <script>
        // Gallery Data
        const galleryItems = [
            { id: 1, category: 'furniture', title: 'Wooden Sofa Set', description: 'Premium teak wood sofa with cushion', image: 'https://via.placeholder.com/400x400/e67e22/ffffff?text=Wooden+Sofa' },
            { id: 2, category: 'furniture', title: 'Dining Table', description: '6 seater dining table with chairs', image: 'https://via.placeholder.com/400x400/d35400/ffffff?text=Dining+Table' },
            { id: 3, category: 'kitchen', title: 'Modular Kitchen', description: 'L-shaped modular kitchen design', image: 'https://via.placeholder.com/400x400/2c3e50/ffffff?text=Modular+Kitchen' },
            { id: 4, category: 'kitchen', title: 'Kitchen Cabinet', description: 'Custom kitchen cabinets with drawers', image: 'https://via.placeholder.com/400x400/34495e/ffffff?text=Kitchen+Cabinet' },
            { id: 5, category: 'bedroom', title: 'King Size Bed', description: 'Wooden king size bed with storage', image: 'https://via.placeholder.com/400x400/8b5a2b/ffffff?text=King+Bed' },
            { id: 6, category: 'bedroom', title: 'Wardrobe', description: '6 door wardrobe with mirror', image: 'https://via.placeholder.com/400x400/a0522d/ffffff?text=Wardrobe' },
            { id: 7, category: 'doors', title: 'Main Door', description: 'Teak wood main door design', image: 'https://via.placeholder.com/400x400/6b4423/ffffff?text=Main+Door' },
            { id: 8, category: 'doors', title: 'French Doors', description: 'Glass panel french doors', image: 'https://via.placeholder.com/400x400/8b4513/ffffff?text=French+Doors' }
        ];

        // Projects Data
        const projects = [
            { id: 1, title: 'Luxury Villa Interior', description: 'Complete woodwork for 5 bedroom villa', image: 'https://via.placeholder.com/400x300/e67e22/ffffff?text=Luxury+Villa', tags: ['Furniture', 'Doors', 'Kitchen'] },
            { id: 2, title: 'Modern Apartment', description: 'Modular kitchen and wardrobes', image: 'https://via.placeholder.com/400x300/d35400/ffffff?text=Modern+Apartment', tags: ['Kitchen', 'Wardrobe'] },
            { id: 3, title: 'Heritage Restoration', description: 'Restored 100 year old haveli furniture', image: 'https://via.placeholder.com/400x300/8b5a2b/ffffff?text=Heritage+Restoration', tags: ['Restoration', 'Antique'] }
        ];

        let currentFilter = 'all';
        let currentImageIndex = 0;

        // Initialize Gallery
        function renderGallery(filter = 'all') {
            const galleryGrid = document.getElementById('galleryGrid');
            const filtered = filter === 'all' ? galleryItems : galleryItems.filter(item => item.category === filter);
            
            galleryGrid.innerHTML = filtered.map(item => `
                <div class="gallery-item" onclick="openLightbox(${item.id})">
                    <img src="${item.image}" alt="${item.title}">
                    <div class="gallery-overlay">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                </div>
            `).join('');
        }

        // Filter Gallery
        function filterGallery(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGallery(category);
        }

        // Render Projects
        function renderProjects() {
            const projectsContainer = document.getElementById('projectsContainer');
            projectsContainer.innerHTML = projects.map(project => `
                <div class="project-card">
                    <div class="project-image">
                        <img src="${project.image}" alt="${project.title}">
                    </div>
                    <div class="project-info">
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                        <div class="project-tags">
                            ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Lightbox Functions
        function openLightbox(id) {
            const item = galleryItems.find(i => i.id === id);
            if (item) {
                currentImageIndex = galleryItems.findIndex(i => i.id === id);
                document.getElementById('lightboxImage').src = item.image;
                document.getElementById('lightbox').classList.add('active');
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function changeImage(direction) {
            currentImageIndex = (currentImageIndex + direction + galleryItems.length) % galleryItems.length;
            document.getElementById('lightboxImage').src = galleryItems[currentImageIndex].image;
        }

        // Language Switch
        let currentLang = 'hi';

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-hi').classList.remove('active');
            document.getElementById('lang-en').classList.remove('active');
            document.getElementById(`lang-${lang}`).classList.add('active');

            document.querySelectorAll('[data-en][data-hi]').forEach(element => {
                element.textContent = element.getAttribute(`data-${lang}`);
            });
        }

        // Form Submit
        function submitForm() {
            alert(currentLang === 'hi' ? 'धन्यवाद! हम जल्द ही आपसे संपर्क करेंगे।' : 'Thank you! We will contact you soon.');
            document.getElementById('contactForm').reset();
        }

        // Navbar Scroll Effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Smooth Scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderGallery();
            renderProjects();
            switchLanguage('hi');
        });
    </script>
</body>

</html>
